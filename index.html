<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGSocial BETA</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;display:flex}
.sidebar{width:200px;background:#0f172a;padding:10px}
.menu-item{background:#1f2937;margin:5px 0;padding:10px;border-radius:10px;cursor:pointer}
.main{flex:1;padding:15px}
.fab{position:fixed;bottom:20px;left:20px;width:55px;height:55px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:25px;cursor:pointer}
input{width:100%;margin:5px 0;padding:10px;border-radius:10px;border:none}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#f59e0b;cursor:pointer}
.post{background:#111827;padding:10px;margin-top:10px;border-radius:10px}
.like{background:#2563eb;margin-top:5px}
.panel{display:none;background:#0f172a;padding:10px;border-radius:10px;margin-bottom:10px}
.avatar{width:35px;height:35px;border-radius:50%;background:#f59e0b;display:flex;align-items:center;justify-content:center;margin-bottom:5px}
img{max-width:100%;max-height:250px;border-radius:10px;margin-top:5px}
.delete{background:#dc2626;margin-top:5px}
</style>
</head>

<body>

<div class="sidebar">
<h3>🐔 CGSocial</h3>
<div class="menu-item" onclick="togglePanel()">👤 Perfil</div>
</div>

<div class="main">

<h3 id="status">Modo Invitado</h3>

<div id="panel" class="panel">
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<input id="username" placeholder="Nombre">
<button onclick="register()">Crear cuenta</button>
<button onclick="login()">Iniciar sesión</button>
<button onclick="logout()" style="background:#dc2626">Cerrar sesión</button>
</div>

<div id="postBox" style="display:none;">
<input id="postInput" placeholder="Escribe algo...">
<input type="file" id="imgPost" accept="image/*">
<button onclick="addPost()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<div class="fab" onclick="togglePanel()">+</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyArVnNFSKQJJ0aWxblU7DtS_pGO4RJlZqk",
authDomain: "cgsocial.firebaseapp.com",
projectId: "cgsocial"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userData = null;
let isOwner = false;

// PANEL
function togglePanel(){
let p=document.getElementById("panel");
p.style.display = p.style.display==="block"?"none":"block";
}

// REGISTER
async function register(){
try{
let email=document.getElementById("email").value.trim();
let pass=document.getElementById("password").value.trim();
let name=document.getElementById("username").value.trim();

if(!email||!pass||!name)return alert("Completa todo");

// 🔒 nombre único
let nameLower=name.toLowerCase();
let snap=await db.collection("users").get();
let existe=snap.docs.some(d=>d.data().username.toLowerCase()===nameLower);
if(existe)return alert("Ese nombre ya existe");

let cred=await auth.createUserWithEmailAndPassword(email,pass);

await db.collection("users").doc(cred.user.uid).set({
username:name
});

alert("Cuenta creada");
}catch(e){alert(e.message);}
}

// LOGIN
async function login(){
try{
let email=document.getElementById("email").value.trim();
let pass=document.getElementById("password").value.trim();
await auth.signInWithEmailAndPassword(email,pass);
}catch(e){alert(e.message);}
}

// LOGOUT
function logout(){auth.signOut();}

// SESSION
auth.onAuthStateChanged(async user=>{
if(user){
let doc=await db.collection("users").doc(user.uid).get();
userData=doc.data();

isOwner = userData.username === "TheRudyPlayer";

status.textContent="Usuario: "+userData.username+(isOwner?" ✔️":"");

postBox.style.display="block";
panel.style.display="none";
}else{
status.textContent="Modo Invitado";
postBox.style.display="none";
}
});

// COMPRESIÓN
function compressImage(file){
return new Promise(resolve=>{
let reader=new FileReader();
reader.onload=e=>{
let img=new Image();
img.src=e.target.result;
img.onload=()=>{
let canvas=document.createElement("canvas");
let max=400;
let scale=Math.min(max/img.width,max/img.height);
canvas.width=img.width*scale;
canvas.height=img.height*scale;
let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL("image/jpeg",0.7));
};
};
reader.readAsDataURL(file);
});
}

// POST
async function addPost(){
if(!userData)return alert("Inicia sesión");

let text=document.getElementById("postInput").value.trim();
let file=document.getElementById("imgPost").files[0];
let img=null;

if(file){
img=await compressImage(file);
}

db.collection("posts").add({
user:userData.username,
text:text,
img:img,
likes:0,
time:Date.now(),
uid:auth.currentUser.uid
});

postInput.value="";
imgPost.value="";
}

// LIKE
function likePost(id){
if(!auth.currentUser)return alert("Inicia sesión");

db.collection("posts").doc(id).update({
likes:firebase.firestore.FieldValue.increment(1)
});
}

// DELETE
function deletePost(id, uid){
if(!auth.currentUser)return;

if(isOwner){
db.collection("posts").doc(id).delete();
}else{
if(auth.currentUser.uid!==uid){
return alert("No puedes borrar esto");
}
db.collection("posts").doc(id).delete();
}
}

// FEED
db.collection("posts").orderBy("time","desc")
.onSnapshot(snap=>{
feed.innerHTML="";
snap.forEach(doc=>{
let p=doc.data();

let verified=p.user==="TheRudyPlayer"?"✔️":"";
let avatar=p.user.charAt(0).toUpperCase();

feed.innerHTML+=`
<div class="post">
<div class="avatar">${avatar}</div>
<b>${p.user} ${verified}</b><br>
${p.text}<br>
${p.img?`<img src="${p.img}">`:""}
👍 ${p.likes}
<button class="like" onclick="likePost('${doc.id}')">Like</button>
${(auth.currentUser && (auth.currentUser.uid===p.uid || isOwner))?`<button class="delete" onclick="deletePost('${doc.id}','${p.uid}')">🗑️</button>`:""}
</div>`;
});
});

</script>

</body>
</html>
