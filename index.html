<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGSocial BETA</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;display:flex}
.sidebar{width:200px;background:#0f172a;padding:10px}
.menu-item{background:#1f2937;margin:5px;padding:10px;border-radius:10px}
.main{flex:1;padding:15px}

input{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f59e0b;
  cursor:pointer;
}

.post{
  background:#111827;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.like{
  background:#2563eb;
  margin-top:5px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h3>🐔 CGSocial</h3>
</div>

<div class="main">

<h3 id="status">Modo Invitado</h3>

<div id="authBox">
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <input id="username" placeholder="Nombre">

  <button onclick="register()">Crear cuenta</button>
  <button onclick="login()">Iniciar sesión</button>
</div>

<div id="postBox" style="display:none;">
  <input id="postInput" placeholder="Escribe algo...">
  <button onclick="addPost()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<script>
// 🔥 PON TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyArVnNFSKQJJ0aWxblU7DtS_pGO4RJlZqk",
  authDomain: "cgsocial.firebaseapp.com",
  projectId: "cgsocial"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userData = null;

// REGISTRO
async function register(){
  try{
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();
    let name = document.getElementById("username").value.trim();

    if(!email || !pass || !name){
      return alert("Completa todos los campos");
    }

    let cred = await auth.createUserWithEmailAndPassword(email, pass);

    await db.collection("users").doc(cred.user.uid).set({
      username: name
    });

    alert("Cuenta creada");
  }catch(e){
    alert(e.message);
  }
}

// LOGIN
async function login(){
  try{
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!email || !pass){
      return alert("Faltan datos");
    }

    await auth.signInWithEmailAndPassword(email, pass);
  }catch(e){
    alert(e.message);
  }
}

// SESIÓN
auth.onAuthStateChanged(async user=>{
  const status = document.getElementById("status");
  const postBox = document.getElementById("postBox");
  const authBox = document.getElementById("authBox");

  if(user){
    let doc = await db.collection("users").doc(user.uid).get();
    userData = doc.data();

    status.textContent = "Usuario: " + userData.username;

    postBox.style.display = "block";
    authBox.style.display = "none";
  }else{
    status.textContent = "Modo Invitado";
    postBox.style.display = "none";
    authBox.style.display = "block";
  }
});

// POST
function addPost(){
  let text = document.getElementById("postInput").value.trim();

  if(!text) return;

  db.collection("posts").add({
    user: userData.username,
    text: text,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("postInput").value = "";
}

// LIKE
function likePost(id){
  db.collection("posts").doc(id).update({
    likes: firebase.firestore.FieldValue.increment(1)
  });
}

// FEED
db.collection("posts").orderBy("time","desc")
.onSnapshot(snapshot=>{
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc=>{
    let p = doc.data();

    feed.innerHTML += `
      <div class="post">
        <b>${p.user}</b><br>
        ${p.text}<br>
        👍 ${p.likes}
        <button class="like" onclick="likePost('${doc.id}')">Like</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
