<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGSocial BETA</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:12px;
}

.menu-item{
  padding:10px;
  margin:6px 0;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
}

.main{
  flex:1;
  padding:18px;
}

header{
  background:#111827;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f59e0b;
  cursor:pointer;
  width:100%;
}

.post-box{display:none;margin:10px 0}

.post{
  background:#111827;
  padding:12px;
  border-radius:14px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h3>🐔 CGSocial</h3>
</div>

<div class="main">

<header id="status">Modo Invitado</header>

<!-- LOGIN / REGISTER -->
<div id="authBox">
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <input id="username" placeholder="Nombre visible">

  <input type="file" id="avatar">

  <button onclick="register()">Crear cuenta</button>
  <button onclick="login()">Iniciar sesión</button>
</div>

<!-- POSTS -->
<div class="post-box" id="postBox">
  <input id="postInput" placeholder="Escribe algo...">
  <button onclick="addPost()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<script>
// 🔥 TU CONFIG
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUserData = null;

// REGISTRO
async function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;
  let username = document.getElementById("username").value;
  let file = document.getElementById("avatar").files[0];

  if(!email || !pass || !username){
    return alert("Completa todo");
  }

  let userCred = await auth.createUserWithEmailAndPassword(email, pass);
  let uid = userCred.user.uid;

  let avatarBase64 = "";

  if(file){
    let reader = new FileReader();
    reader.onload = async e=>{
      avatarBase64 = e.target.result;

      await db.collection("users").doc(uid).set({
        username,
        avatar: avatarBase64
      });
    };
    reader.readAsDataURL(file);
  }else{
    await db.collection("users").doc(uid).set({
      username,
      avatar: username.charAt(0)
    });
  }

  alert("Cuenta creada");
}

// LOGIN
async function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  await auth.signInWithEmailAndPassword(email, pass);
}

// DETECTAR USUARIO
auth.onAuthStateChanged(async user=>{
  let status = document.getElementById("status");
  let box = document.getElementById("postBox");
  let authBox = document.getElementById("authBox");

  if(user){
    let doc = await db.collection("users").doc(user.uid).get();
    currentUserData = doc.data();

    status.textContent = "Usuario: " + currentUserData.username;

    box.style.display = "block";
    authBox.style.display = "none";

  }else{
    status.textContent = "Modo Invitado";
    box.style.display = "none";
    authBox.style.display = "block";
  }
});

// POST
function addPost(){
  let text = document.getElementById("postInput").value;

  db.collection("posts").add({
    text,
    user: currentUserData.username,
    avatar: currentUserData.avatar,
    time: Date.now()
  });
}

// FEED
db.collection("posts").orderBy("time","desc")
.onSnapshot(snapshot=>{
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc=>{
    let p = doc.data();

    feed.innerHTML += `
      <div class="post">
        <b>${p.user}</b><br>
        ${p.text}
      </div>
    `;
  });
});
</script>

</body>
</html>
