<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGSocial 2.5 FINAL</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;display:flex}
.sidebar{width:200px;background:#0f172a;padding:10px}
.menu-item{background:#1f2937;margin:5px 0;padding:10px;border-radius:10px;cursor:pointer}
.main{flex:1;padding:15px}
input{width:100%;margin:5px 0;padding:10px;border-radius:10px;border:none}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#f59e0b}
.post{background:#111827;padding:10px;margin-top:10px;border-radius:10px}
.like{background:#2563eb;margin-top:5px}
.avatar{width:40px;height:40px;border-radius:50%;background:#f59e0b;display:flex;align-items:center;justify-content:center;margin-bottom:5px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
img{max-width:100%;max-height:250px;border-radius:10px;margin-top:5px}
.delete{background:#dc2626;margin-top:5px}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>🐔 CGSocial</h3>
<div class="menu-item" onclick="showFeed()">🏠 Feed</div>
<div class="menu-item" onclick="showProfile()">👤 Perfil</div>
</div>

<div class="main">

<!-- FEED -->
<div id="feedView">

<h3 id="status">Modo Invitado</h3>

<div id="postBox" style="display:none;">
<input id="postInput" placeholder="Escribe algo...">
<input type="file" id="imgPost" accept="image/*">
<button onclick="addPost()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<!-- PERFIL -->
<div id="profileView" style="display:none;">

<h3>Perfil</h3>

<div id="guestPanel">
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<input id="username" placeholder="Nombre">
<button onclick="register()">Crear cuenta</button>
<button onclick="login()">Iniciar sesión</button>
</div>

<div id="userPanel" style="display:none;">
<input type="file" id="profileImg" accept="image/png, image/jpeg, image/webp">
<button onclick="changeProfile()">Cambiar foto de perfil</button>
<button onclick="logout()" style="background:#dc2626">Cerrar sesión</button>
</div>

</div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig={
apiKey:"AIzaSyArVnNFSKQJJ0aWxblU7DtS_pGO4RJlZqk",
authDomain:"cgsocial.firebaseapp.com",
projectId:"cgsocial"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let userData=null;
let isOwner=false;

// 🔁 VISTAS
function showFeed(){
feedView.style.display="block";
profileView.style.display="none";
}

function showProfile(){
feedView.style.display="none";
profileView.style.display="block";
}

// ⏱️ TIEMPO
function tiempo(t){
let diff=Math.floor((Date.now()-t)/1000);
if(diff<60)return diff+"s";
if(diff<3600)return Math.floor(diff/60)+" min";
if(diff<86400)return Math.floor(diff/3600)+" h";
if(diff<31536000)return Math.floor(diff/86400)+" d";
return Math.floor(diff/31536000)+" a";
}

// 🧾 REGISTER
async function register(){
try{
let email=email.value.trim();
let pass=password.value.trim();
let name=username.value.trim();

if(!email||!pass||!name)return alert("Completa todo");

// nombre único
let snap=await db.collection("users").get();
let existe=snap.docs.some(d=>d.data().username.toLowerCase()===name.toLowerCase());
if(existe)return alert("Nombre en uso");

let cred=await auth.createUserWithEmailAndPassword(email,pass);

await db.collection("users").doc(cred.user.uid).set({
username:name,
photo:null
});

alert("Cuenta creada");
}catch(e){alert(e.message);}
}

// 🔐 LOGIN
async function login(){
try{
await auth.signInWithEmailAndPassword(email.value,password.value);
}catch(e){alert(e.message);}
}

// 🚪 LOGOUT
function logout(){auth.signOut();}

// 🖼️ FOTO PERFIL
async function changeProfile(){
let file=profileImg.files[0];
if(!file)return alert("Selecciona imagen");

let tipos=["image/png","image/jpeg","image/webp"];
if(!tipos.includes(file.type))return alert("Solo PNG JPG WEBP");

let reader=new FileReader();

reader.onload=async e=>{
let base64=e.target.result;

await db.collection("users").doc(auth.currentUser.uid).update({
photo:base64
});

userData.photo=base64;

alert("Foto actualizada ✅");
};

reader.readAsDataURL(file);
}

// 👤 SESSION
auth.onAuthStateChanged(async user=>{
if(user){
let doc=await db.collection("users").doc(user.uid).get();
userData=doc.data();

isOwner=userData.username==="TheRudyPlayer";

status.textContent="Usuario: "+userData.username+(isOwner?" ✓":"");

postBox.style.display="block";
guestPanel.style.display="none";
userPanel.style.display="block";

}else{
status.textContent="Modo Invitado";
postBox.style.display="none";
guestPanel.style.display="block";
userPanel.style.display="none";
}
});

// 🖼️ COMPRESIÓN
function compressImage(file){
return new Promise(resolve=>{
let reader=new FileReader();
reader.onload=e=>{
let img=new Image();
img.src=e.target.result;
img.onload=()=>{
let canvas=document.createElement("canvas");
let max=400;
let scale=Math.min(max/img.width,max/img.height);
canvas.width=img.width*scale;
canvas.height=img.height*scale;
let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,canvas.width,canvas.height);
resolve(canvas.toDataURL("image/jpeg",0.7));
};
};
reader.readAsDataURL(file);
});
}

// 📝 POST
async function addPost(){
if(!auth.currentUser)return alert("Inicia sesión");

let text=postInput.value.trim();
let file=imgPost.files[0];
let img=null;

if(file)img=await compressImage(file);

db.collection("posts").add({
user:userData.username,
text:text,
img:img,
likes:0,
time:Date.now(),
uid:auth.currentUser.uid,
photo:userData.photo||null
});

postInput.value="";
imgPost.value="";
}

// 👍 LIKE
function likePost(id){
if(!auth.currentUser)return alert("Inicia sesión");

db.collection("posts").doc(id).update({
likes:firebase.firestore.FieldValue.increment(1)
});
}

// 🗑️ DELETE
function deletePost(id,uid){
if(isOwner||auth.currentUser.uid===uid){
db.collection("posts").doc(id).delete();
}else{
alert("No puedes borrar esto");
}
}

// 🔥 FEED
db.collection("posts").orderBy("time","desc")
.onSnapshot(snap=>{
feed.innerHTML="";

snap.forEach(doc=>{
let p=doc.data();

let avatar=p.photo
? `<img src="${p.photo}">`
: p.user.charAt(0).toUpperCase();

let verified=p.user==="TheRudyPlayer"?"✓":"";

feed.innerHTML+=`
<div class="post">
<div class="avatar">${avatar}</div>
<b>${p.user} ${verified}</b> · ${tiempo(p.time)}<br>
${p.text}<br>
${p.img?`<img src="${p.img}">`:""}
👍 ${p.likes}
<button class="like" onclick="likePost('${doc.id}')">Like</button>
${(auth.currentUser&&(auth.currentUser.uid===p.uid||isOwner))?`<button class="delete" onclick="deletePost('${doc.id}','${p.uid}')">🗑️</button>`:""}
</div>`;
});

});

</script>

</body>
</html>
