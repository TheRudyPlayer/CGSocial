<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGSocial 2.0</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:12px;
}

.menu-item{
  padding:10px;
  margin:6px 0;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
}

.menu-item:hover{background:#334155}

.main{
  flex:1;
  padding:18px;
}

header{
  background:#111827;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.post-box{
  display:none;
  gap:8px;
  margin:14px 0;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f59e0b;
  cursor:pointer;
}

.post{
  background:#111827;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  gap:10px;
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#f59e0b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.post-content{flex:1}
</style>
</head>
<body>

<div class="sidebar">
  <h3>🐔 CGSocial</h3>
  <div class="menu-item" onclick="login()">🔐 Iniciar sesión</div>
  <div class="menu-item" onclick="logout()">🚪 Cerrar sesión</div>
</div>

<div class="main">

<header id="status">Modo Invitado</header>

<div class="post-box" id="postBox">
  <input id="postInput" placeholder="Escribe algo...">
  <button onclick="addPost()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<script>
// 🔥 PON TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyArVnNFSKQJJ0aWxblU7DtS_pGO4RJlZqk",
  authDomain: "cgsocial.firebaseapp.com",
  projectId: "cgsocial",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// LOGOUT
function logout(){
  auth.signOut();
}

// DETECTAR USUARIO
auth.onAuthStateChanged(user=>{
  let status = document.getElementById("status");
  let box = document.getElementById("postBox");

  if(user){
    status.textContent = "Usuario: " + user.displayName;
    box.style.display = "flex";
  }else{
    status.textContent = "Modo Invitado";
    box.style.display = "none";
  }
});

// POST
function addPost(){
  let user = auth.currentUser;
  let text = document.getElementById("postInput").value;

  if(!user) return alert("Inicia sesión");

  db.collection("posts").add({
    user: user.displayName,
    text: text,
    time: Date.now()
  });

  document.getElementById("postInput").value = "";
}

// FEED
db.collection("posts").orderBy("time","desc")
.onSnapshot(snapshot=>{
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc=>{
    let p = doc.data();

    let avatar = p.user.charAt(0).toUpperCase();

    feed.innerHTML += `
      <div class="post">
        <div class="avatar">${avatar}</div>
        <div class="post-content">
          <b>${p.user}</b><br>
          ${p.text}
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
