<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGSocial Pre-Alpha 1.6 FIX</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1220;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:12px;
}

.menu-item{
  padding:10px;
  margin:6px 0;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
}

.menu-item:hover{background:#334155}

.main{
  flex:1;
  padding:18px;
}

header{
  background:#111827;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.badge{
  background:#ef4444;
  padding:3px 8px;
  border-radius:8px;
  font-size:10px;
  margin-left:6px;
}

.status{
  font-size:12px;
  color:#94a3b8;
}

.post-box{
  display:none;
  gap:8px;
  margin:14px 0;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  background:#f59e0b;
  cursor:pointer;
}

.post{
  background:#111827;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  gap:10px;
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#f59e0b;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-weight:bold;
  flex-shrink:0;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.post-content{
  flex:1;
}

.post img{
  max-width:100%;
  margin-top:8px;
  border-radius:10px;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.like-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
}

.delete-btn{
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
}

.profile-panel{
  display:none;
  background:#0f172a;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h3>🐔 CGSocial</h3>
  <div class="menu-item" onclick="showHome()">🏠 Inicio</div>
  <div class="menu-item" onclick="showProfile()">👤 Perfil</div>
</div>

<div class="main">

<header>
CGSocial <span class="badge">PRE-ALPHA</span>
<div class="status" id="status">Modo Invitado</div>
</header>

<div class="profile-panel" id="profilePanel">
  <h3>Perfil</h3>
  <input id="nickInput" placeholder="Nickname">
  <input type="file" id="avatarFile" accept="image/*">
  <button onclick="createAccount()">Crear cuenta</button>
  <button onclick="loginAccount()">Iniciar sesión</button>
</div>

<div class="post-box" id="postBox">
  <input id="postInput" placeholder="Escribe algo...">
  <input id="imgInput" placeholder="Imagen URL">
  <button onclick="addPost()">Publicar</button>
</div>

<div id="feed"></div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("cg_user")) || null;
let posts = JSON.parse(localStorage.getItem("cg_posts")) || [];
let users = JSON.parse(localStorage.getItem("cg_users")) || [];

function showProfile(){
  document.getElementById("profilePanel").style.display = "block";
}

function showHome(){
  document.getElementById("profilePanel").style.display = "none";
}

function createAccount(){
  let nick=document.getElementById("nickInput").value.trim();
  let file=document.getElementById("avatarFile").files[0];

  if(!nick) return alert("Nick requerido");
  if(users.find(u=>u.nick===nick)) return alert("Nick existe");

  if(file){
    let r=new FileReader();
    r.onload=e=>saveUser(nick,e.target.result);
    r.readAsDataURL(file);
  }else saveUser(nick,null);
}

function saveUser(nick,img){
  user={nick,avatar:img||nick.charAt(0).toUpperCase()};
  users.push(user);

  localStorage.setItem("cg_users",JSON.stringify(users));
  localStorage.setItem("cg_user",JSON.stringify(user));

  applyLogin();
}

function loginAccount(){
  let nick=document.getElementById("nickInput").value.trim();
  let found=users.find(u=>u.nick===nick);

  if(!found) return alert("No existe");

  user=found;
  localStorage.setItem("cg_user",JSON.stringify(user));
  applyLogin();
}

function applyLogin(){
  document.getElementById("status").textContent="Usuario: "+user.nick;
  document.getElementById("postBox").style.display="flex";
  render();
}

function addPost(){
  if(!user) return;

  let text=document.getElementById("postInput");
  let img=document.getElementById("imgInput");

  if(!text.value.trim()) return;

  posts.push({
    user:user.nick,
    avatar:user.avatar,
    text:text.value,
    img:img.value||null,
    likes:0
  });

  text.value="";
  img.value="";

  localStorage.setItem("cg_posts",JSON.stringify(posts));
  render();
}

function likePost(i){
  let r=posts.length-1-i;
  if(posts[r]){
    posts[r].likes++;
    save();
    render();
  }
}

function deletePost(i){
  let r=posts.length-1-i;
  if(posts[r]){
    posts.splice(r,1);
    save();
    render();
  }
}

function save(){
  localStorage.setItem("cg_posts",JSON.stringify(posts));
}

function render(){
  let feed=document.getElementById("feed");
  feed.innerHTML="";

  posts.slice().reverse().forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="post";

    let avatarHTML;

    if(p.avatar && typeof p.avatar === "string" && p.avatar.startsWith("data")){
      avatarHTML = `<img src='${p.avatar}'>`;
    } else {
      avatarHTML = (p.avatar || "?");
    }

    div.innerHTML=`
      <div class="avatar">${avatarHTML}</div>
      <div class="post-content">
        <b>${p.user}</b><br>
        ${p.text}
        ${p.img?`<img src='${p.img}'>`:""}
        <div>👍 ${p.likes}</div>
        ${user?`<div class='actions'>
          <button class='like-btn' onclick='likePost(${i})'>Me gusta</button>
          <button class='delete-btn' onclick='deletePost(${i})'>Eliminar</button>
        </div>`:""}
      </div>
    `;

    feed.appendChild(div);
  });
}

render();
</script>

</body>
</html>
